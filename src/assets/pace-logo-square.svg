<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" rx="72" fill="#0f172a"/>

  <!-- Three forward-pointing triangles, centered in upper portion -->
  <polygon points="52,128 52,248 128,188" fill="#1e40af"/>
  <polygon points="140,142 140,234 208,188" fill="#3b82f6"/>
  <polygon points="220,156 220,220 280,188" fill="#93c5fd"/>

  <!-- Subtle horizontal rule -->
  <line x1="52" y1="272" x2="348" y2="272" stroke="#1e293b" stroke-width="1.5"/>

  <!-- PACE wordmark -->
  <text x="200" y="332"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="72" font-weight="800" letter-spacing="8"
        text-anchor="middle" fill="#f1f5f9">PACE</text>

  <!-- FRAMEWORK label -->
  <text x="200" y="364"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="20" font-weight="500" letter-spacing="10"
        text-anchor="middle" fill="#475569">FRAMEWORK</text>
</svg>
