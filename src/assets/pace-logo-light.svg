<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44" fill="none">
  <!-- Three forward-pointing triangles — pipeline acceleration mark -->
  <polygon points="4,8 4,36 22,22" fill="#1e40af"/>
  <polygon points="24,11 24,33 40,22" fill="#2563eb"/>
  <polygon points="42,14 42,30 56,22" fill="#3b82f6"/>

  <!-- Separator -->
  <line x1="66" y1="9" x2="66" y2="35" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>

  <!-- PACE wordmark -->
  <text x="76" y="29"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="21" font-weight="800" letter-spacing="2" fill="#0f172a">PACE</text>

  <!-- FRAMEWORK label -->
  <text x="77" y="40"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="7.5" font-weight="500" letter-spacing="4" fill="#64748b">FRAMEWORK</text>
</svg>
